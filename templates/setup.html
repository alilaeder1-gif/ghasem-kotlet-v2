<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تنظیمات اولیه - پنل مدیریت</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 450px;
        }
        .setup-card h2 { color: #fff; text-align: center; margin-bottom: 10px; }
        .setup-card p { color: #a5b4fc; text-align: center; margin-bottom: 25px; }
        .setup-card .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px 15px;
            border-radius: 10px;
        }
        .setup-card .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: #6366f1;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.25);
        }
        .setup-card .form-control::placeholder { color: #a5b4fc; }
        .setup-card .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 1.1rem;
        }
        .setup-card .btn-primary:hover { background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%); }
        .alert { border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <div class="setup-card">
        <h2><i class="fas fa-cog"></i> تنظیمات اولیه</h2>
        <p>برای پنل مدیریت یه رمز عبور بساز</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="رمز عبور جدید (حداقل ۴ کاراکتر)" required minlength="4" autofocus>
            </div>
            <div class="mb-3">
                <input type="password" name="confirm" class="form-control" placeholder="تکرار رمز عبور" required minlength="4">
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-check"></i> ذخیره و ورود
            </button>
        </form>
    </div>
</body>
</html>
